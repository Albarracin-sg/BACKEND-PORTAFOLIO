services:
  database:
    image: postgres:17-alpine
    container_name: portfolio-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-portfolio}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: portfolio-api
    restart: always
    ports:
      - "${PORT:-6767}:6767"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@database:5432/${DB_NAME:-portfolio}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - database
    volumes:
      - ../../uploads:/app/uploads

volumes:
  postgres_data:
